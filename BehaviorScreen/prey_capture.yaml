filters:
  distance_center: {'<=': 10} 
  proba: {'>=': 0.5}
  distance: {'<=': 100}
  peak_axial_speed: {'<=': 300}
  heading_mismatch_max: {'<=': 180}
  centroid_mismatch_max: {'<=': 1000}
  file: {'not_in': ["fish_1", "fish_2"]}

time_bins:
  - [0, 2.5]
  - [2.5, 5]
  - [5, 7.5]
  - [7.5, 10]
  - [10, 15]
  - [15, 25]

stimuli:

  - stim: PREY_CAPTURE
    name: "pc small"
    parameters: 
       - prey_arc_start_deg: {'==': -20}
         prey_radius_mm: {'==': 0.05}
       - prey_arc_start_deg: {'==': 20}
         prey_radius_mm: {'==': 0.05}
    trial_range: 
      start: 0
      stop: 5
      step: 1

  - stim: PREY_CAPTURE
    name: "pc medium"
    parameters: 
       - prey_arc_start_deg: {'==': -20}
         prey_radius_mm: {'==': 0.15}
       - prey_arc_start_deg: {'==': 20}
         prey_radius_mm: {'==': 0.15}
    trial_range: 
      start: 0
      stop: 5
      step: 1

  - stim: PREY_CAPTURE
    name: "pc large"
    parameters: 
       - prey_arc_start_deg: {'==': -20}
         prey_radius_mm: {'==': 0.50}
       - prey_arc_start_deg: {'==': 20}
         prey_radius_mm: {'==': 0.50}
    trial_range: 
      start: 0
      stop: 5
      step: 1
